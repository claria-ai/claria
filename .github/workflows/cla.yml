name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md#contributor-license-agreement"
          branch: "main"
          allowlist: xrl
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this, you need to agree to our [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md#contributor-license-agreement).

            Please read the CLA and reply with the following comment to agree:

            > I have read the CLA and I agree to it.
          custom-pr-sign-comment: "I have read the CLA and I agree to it."
